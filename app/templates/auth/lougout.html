<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV - Adega Premium</title>

    <link rel="stylesheet" href="/static/css/home.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <div class="container">

        <!-- CONTEÚDO -->
        <main class="conteudo">

            <!-- CABEÇALHO -->
            <header>

                <div class="logo">

                    <div class="icone">
                        <i class="fa-solid fa-wine-glass"></i>
                    </div>

                    <div>
                        <h2>Adega Premium</h2>
                        <span>Sistema PDV</span>
                    </div>

                </div>

                <div class="data">
                    <i class="fa-regular fa-clock"></i>
                    <span>16:08</span>
                    <span>•</span>
                    <span>24 de Abril de 2026</span>
                </div>

            </header>

            <!-- MENU -->
            <nav>

                <a href="#" class="ativo">
                    <i class="fa-solid fa-cart-shopping"></i>
                    Ponto de Venda
                </a>

                <a href="#">
                    <i class="fa-solid fa-chart-line"></i>
                    Histórico
                </a>

                <a href="#">
                    <i class="fa-solid fa-box"></i>
                    Produtos
                </a>

                <a href="#">
                    <i class="fa-solid fa-users"></i>
                    Clientes
                </a>

                <a href="#">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Sair
                </a>

            </nav>

            <!-- PESQUISA -->
            <section class="pesquisa">

                <div class="buscar">

                    <i class="fa-solid fa-magnifying-glass"></i>

                    <input
                        type="text"
                        placeholder="Buscar produtos...">

                </div>

            </section>

            <!-- CATEGORIAS -->
            <section class="categorias">

                <button class="ativo">Todos</button>

                <button>Cervejas</button>

                <button>Refrigerantes</button>

                <button>Combos</button>

                <button>Kit Narguilé</button>

                <button>Bebidas</button>

                <button>Vinhos</button>

                <button>Doces</button>

            </section>

            <!-- ÁREA PRINCIPAL -->
            <section class="conteudo-principal">

                <div class="mensagem">

                    <i class="fa-solid fa-wine-bottle"></i>

                    <h2>Bem-vindo ao Sistema da Adega</h2>

                    <p>
                        Utilize o menu acima para acessar os módulos do sistema.
                    </p>

                </div>

            </section>

        </main>

        <!-- CARRINHO -->
        <aside class="carrinho">

            <div class="titulo">

                <h2>

                    <i class="fa-solid fa-cart-shopping"></i>

                    Carrinho

                </h2>

                <span>0 item(s)</span>

            </div>

            <div class="vazio">

                <i class="fa-solid fa-cart-shopping"></i>

                <h3>Carrinho vazio</h3>

                <p>Adicione produtos para começar.</p>

            </div>

        </aside>

    </div>

    <script src="/static/js/home.js"></script>

</body>

</html>
