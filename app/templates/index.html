<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAPM - Sistema</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        :root {
            --bg: #121212;
            --card: #1E1E1E;

            --primary: #FDE68A;
            --highlight: #FEF3C7;

            --text: #F9FAFB;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #121212, #000000);
            color: var(--text);
            overflow: hidden;
        }

        /* efeito futurista leve */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(253, 230, 138, 0.05),
                transparent
            );
            animation: move 10s linear infinite;
        }

        @keyframes move {
            0% { transform: translate(-25%, -25%) rotate(0deg); }
            100% { transform: translate(-25%, -25%) rotate(360deg); }
        }

        .card {
            position: relative;
            width: 420px;
            text-align: center;
            padding: 50px 40px;
            border-radius: 18px;

            background: var(--card);
            backdrop-filter: blur(12px);

            border: 1px solid rgba(253, 230, 138, 0.15);

            box-shadow:
                0 0 25px rgba(253, 230, 138, 0.08),
                0 0 60px rgba(0, 0, 0, 0.6);

            z-index: 1;
        }

        h1 {
            font-size: 34px;
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 12px rgba(253, 230, 138, 0.25);
            margin-bottom: 10px;
        }

        p {
            color: var(--text);
            opacity: 0.8;
            margin-bottom: 30px;
            font-size: 15px;
        }

        a {
            display: inline-block;
            padding: 14px 28px;

            color: #111;
            background: var(--primary);

            border-radius: 12px;
            font-weight: bold;
            text-decoration: none;

            box-shadow: 0 0 20px rgba(253, 230, 138, 0.25);

            transition: 0.3s;
        }

        a:hover {
            transform: scale(1.05);
            background: var(--highlight);
            box-shadow: 0 0 30px rgba(254, 243, 199, 0.4);
        }

        .tag {
            margin-top: 18px;
            font-size: 11px;
            color: var(--highlight);
            letter-spacing: 1px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>AAPM</h1>

        <p>Sistema inteligente de acesso • Faça login para continuar</p>

        <a href="/auth/login">ACESSAR SISTEMA</a>

        <div class="tag">
            NEURAL ACCESS SYSTEM v1.0
        </div>
    </div>

</body>

</html>
